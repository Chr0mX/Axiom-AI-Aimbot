name: Auto Tag and Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create next 1.x tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags

          latest_tag=$(git tag --list '1.*' --sort=-v:refname | head -n 1)

          if [[ -z "${latest_tag}" ]]; then
            next_tag="1.0"
          else
            latest_minor="${latest_tag#1.}"
            next_minor=$((latest_minor + 1))
            next_tag="1.${next_minor}"
          fi

          echo "next_tag=${next_tag}" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag "${next_tag}"
          git push origin "${next_tag}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.next_tag }}
          name: Release ${{ steps.tag.outputs.next_tag }}
          generate_release_notes: true
