name: Auto Tag and Release

on:
  workflow_run:
    types:
      - completed
    branches:
      - main
      - master
      - GPU

  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: windows-latest

    steps:
      - name: Checkout build commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Download build artifacts
        uses: dawidd6/action-download-artifact@v3
        with:
          run_id: ${{ github.event.workflow_run.id }}
          name: .*-win-x64
          name_is_regexp: true
          path: .\artifacts
          merge_multiple: true

      - name: Set release mode
        id: mode
        shell: pwsh
        run: |
          $branch = "${{ github.event.workflow_run.head_branch }}"

          if ($branch -eq "GPU") {
            "tag_prefix=release-gpu-v" >> $env:GITHUB_OUTPUT
            "release_name=Release GPU" >> $env:GITHUB_OUTPUT
          }
          else {
            "tag_prefix=release-v" >> $env:GITHUB_OUTPUT
            "release_name=Release" >> $env:GITHUB_OUTPUT
          }

      - name: Generate incremental tag
        id: tag
        shell: pwsh
        run: |
          git fetch --tags

          $prefix = "${{ steps.mode.outputs.tag_prefix }}"
          $tags = git tag -l "$prefix*"

          $max = 0
          foreach ($tag in $tags) {
            if ($tag -match "^$([regex]::Escape($prefix))(\d+)$") {
              $num = [int]$matches[1]
              if ($num -gt $max) { $max = $num }
            }
          }

          $next = $max + 1
          $newTag = "$prefix$next"

          "tag=$newTag" >> $env:GITHUB_OUTPUT
          "version=$next" >> $env:GITHUB_OUTPUT

      - name: Create tag
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.tag }}" "${{ github.event.workflow_run.head_sha }}"
          git push origin "${{ steps.tag.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.mode.outputs.release_name }} ${{ steps.tag.outputs.version }}
          target_commitish: ${{ github.event.workflow_run.head_sha }}
          files: .\artifacts\**
